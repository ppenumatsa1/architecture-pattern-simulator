events {}

http {
  # Re-resolve Docker service names to avoid stale upstream IPs after container restarts.
  resolver 127.0.0.11 valid=5s ipv6=off;

  upstream ui {
    server ui:5173;
  }

  upstream monolith_api {
    server monolith-api:8000;
  }

  upstream submission_api {
    server submission-api:8000;
  }

  upstream status_api {
    server status-api:8000;
  }

  upstream command_api {
    server command-api:8000;
  }

  upstream query_api {
    server query-api:8000;
  }

  server {
    listen 80;

    location ~ ^/api/monolith/submissions/[^/]+/events$ {
      set $monolith_api_url http://monolith-api:8000;
      rewrite ^/api/monolith/(.*)$ /$1 break;
      proxy_pass $monolith_api_url;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_cache off;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 1h;
      proxy_send_timeout 1h;
      add_header X-Accel-Buffering no;
    }

    location /api/monolith/ {
      set $monolith_api_url http://monolith-api:8000;
      rewrite ^/api/monolith/(.*)$ /$1 break;
      proxy_pass $monolith_api_url;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/microservices/submissions/[^/]+/events$ {
      set $status_api_url http://status-api:8000;
      rewrite ^/api/microservices/(.*)$ /$1 break;
      proxy_pass $status_api_url;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_cache off;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 1h;
      proxy_send_timeout 1h;
      add_header X-Accel-Buffering no;
    }

    location ~ ^/api/microservices/submissions/([^/]+)$ {
      set $status_api_url http://status-api:8000;
      rewrite ^/api/microservices/submissions/([^/]+)$ /submissions/$1 break;
      proxy_pass $status_api_url;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/microservices/submissions/([^/]+)/status$ {
      set $status_api_url http://status-api:8000;
      rewrite ^/api/microservices/submissions/([^/]+)/status$ /submissions/$1 break;
      proxy_pass $status_api_url;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/microservices/dashboard/submissions {
      proxy_pass http://status-api:8000/dashboard/submissions;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/microservices/ {
      set $submission_api_url http://submission-api:8000;
      rewrite ^/api/microservices/(.*)$ /$1 break;
      proxy_pass $submission_api_url;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /api/event-sourcing/commands/ {
      set $command_api_url http://command-api:8000;
      rewrite ^/api/event-sourcing/(.*)$ /$1 break;
      proxy_pass $command_api_url;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/event-sourcing/submissions/[^/]+/events$ {
      set $query_api_url http://query-api:8000;
      rewrite ^/api/event-sourcing/(.*)$ /$1 break;
      proxy_pass $query_api_url;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_cache off;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 1h;
      proxy_send_timeout 1h;
      add_header X-Accel-Buffering no;
    }

    location ~ ^/api/event-sourcing/projections/([^/]+)$ {
      set $query_api_url http://query-api:8000;
      rewrite ^/api/event-sourcing/projections/([^/]+)$ /submissions/$1 break;
      proxy_pass $query_api_url;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/event-sourcing/ {
      set $query_api_url http://query-api:8000;
      rewrite ^/api/event-sourcing/(.*)$ /$1 break;
      proxy_pass $query_api_url;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://ui;
      proxy_set_header Host $host;
    }
  }
}
